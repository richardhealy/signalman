apiVersion: 1

# Contact point — logs to stderr in the demo stack (no real email needed).
contactPoints:
  - orgId: 1
    name: signalman-log
    receivers:
      - uid: signalman-log-receiver
        type: email
        settings:
          addresses: ops@signalman.internal
        disableResolveMessage: false

# Default notification policy — all firing alerts go to the log receiver.
policies:
  - orgId: 1
    receiver: signalman-log
    group_by: [alertname, slo_step]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h

# Per-step SLO alert rules.
groups:
  - orgId: 1
    name: signalman-slos
    folder: Signalman
    interval: 1m
    rules:

      # ── Inventory Hold ──────────────────────────────────────────────────────

      - uid: slo-inventory-hold-p99
        title: "Inventory Hold p99 > 500 ms (SLO breach)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.99, sum by (le) (
                  rate(signalman_signalman_operation_duration_seconds_bucket{operation="InventoryController/hold"}[5m])
                ))
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.5] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: OK
        execErrState: OK
        for: 5m
        labels: { severity: warning, slo_step: inventory_hold, slo_type: latency }
        annotations:
          summary: "Inventory Hold p99 latency is breaching the 500 ms SLO"
          description: "The p99 latency for InventoryController/hold exceeded 500 ms for 5 minutes."
        isPaused: false

      - uid: slo-inventory-hold-errors
        title: "Inventory Hold error rate > 1% (SLO breach)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(signalman_signalman_operation_errors_total{operation="InventoryController/hold"}[5m]))
                / sum(rate(signalman_signalman_operation_duration_seconds_count{operation="InventoryController/hold"}[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.01] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: OK
        execErrState: OK
        for: 5m
        labels: { severity: warning, slo_step: inventory_hold, slo_type: errors }
        annotations:
          summary: "Inventory Hold error rate is breaching the 1% SLO"
          description: "The error rate for InventoryController/hold exceeded 1% for 5 minutes."
        isPaused: false

