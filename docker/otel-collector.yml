receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Forward traces to Tempo over OTLP/gRPC.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Expose a Prometheus scrape endpoint on :8889 so Prometheus can pull metrics.
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: signalman

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
