global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metric_relabel_configs:
      # Drop the internal OTel Collector self-telemetry scraped via OTLP.
      - source_labels: [__name__]
        regex: 'otelcol_.*'
        action: drop
