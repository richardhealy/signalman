# Prometheus configuration for the signalman demo stack.
# Scrapes RED metrics from the OTel Collector's Prometheus exposition endpoint.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['collector:8889']
        labels:
          stack: signalman
