# Tempo configuration for the signalman demo stack.
#
# Accepts OTLP/gRPC from the OTel Collector and stores traces locally for the
# demo.  Retention is capped at 1 h so the container's ephemeral volume stays
# small.  Grafana queries Tempo over the HTTP API on port 3200.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
