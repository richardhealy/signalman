receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Forward traces to Grafana Tempo over OTLP/gRPC
  otlp/tempo:
    endpoint: http://tempo:4317
    tls:
      insecure: true

  # Expose metrics on /metrics for Grafana's Prometheus datasource
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: signalman

  # Surface collector health and pipeline stats to the debug endpoint
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
